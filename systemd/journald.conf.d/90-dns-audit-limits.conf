# Install: cap journal size so debug from systemd-resolved does not grow without bound.
#
#   sudo install -d -m 0755 /etc/systemd/journald.conf.d
#   sudo install -m 0644 90-dns-audit-limits.conf /etc/systemd/journald.conf.d/
#   sudo systemctl restart systemd-journald
#
# Tune SystemMaxUse / MaxRetentionSec to taste.

[Journal]
SystemMaxUse=200M
SystemKeepFree=500M
MaxRetentionSec=2week
RateLimitIntervalSec=30s
RateLimitBurst=10000
