---
# This play connects to the audit target over SSH; controller-only work uses delegate_to: localhost.
# -e dns_target_host=TARGET_SSH  (or deprecated -e dns_journal_host=…) — required; must be the name you can ssh to
# -e dns_merge_emit_pve=false  # names list only, no getaddrinfo on the controller
# -e dns_merge_python=/usr/bin/python3  # merge step runs on the controller (overrides pyenv shims, etc.)
# SSH options for the play connection: -e ansible_ssh_private_key_file=…, -e dns_audit_ssh_common_args='-o …'
# (defaults include BatchMode and StrictHostKeyChecking=accept-new; override dns_audit_ssh_common_args for password auth, etc.)
- name: Pull dns names and merge
  hosts: "{% if dns_target_host is defined and dns_target_host | string | length > 0 %}{{ dns_target_host }}{% elif dns_journal_host is defined and dns_journal_host | string | length > 0 %}{{ dns_journal_host }}{% else %}__set_dns_target_host__{% endif %}"
  gather_facts: false
  vars:
    dns_audit_root: "{{ playbook_dir | dirname }}"
    dns_audit_local_pull: "{{ dns_audit_root }}/.pulled-audit"
    dns_merge_python: /usr/bin/python3
    ansible_ssh_common_args: "{{ dns_audit_ssh_common_args | default('-o BatchMode=yes -o StrictHostKeyChecking=accept-new', true) }}"

  tasks:
    - name: Assert target host is set
      ansible.builtin.assert:
        that:
          - (dns_target_host is defined and dns_target_host | string | length > 0)
            or (dns_journal_host is defined and dns_journal_host | string | length > 0)
        fail_msg: "Set -e dns_target_host=TARGET_SSH (or deprecated dns_journal_host) to the audit host; it must be your SSH name for that system."

    - name: Ensure local pull directory
      ansible.builtin.file:
        path: "{{ dns_audit_local_pull }}"
        state: directory
        mode: "0750"
      delegate_to: localhost
      connection: local

    - name: Save user and host for controller rsync (delegate_to localhost avoids ansible_host/ssh_user ambiguity)
      ansible.builtin.set_fact:
        _dns_rsync_user: "{{ (dns_audit_rsync_user | default(ansible_user, true) | default(lookup('env', 'USER'), true) | string) }}"
        _dns_rsync_host: "{{ ansible_host | default(inventory_hostname) }}"

    - name: Refresh static APT and NTP host lists on target host
      ansible.builtin.command:
        argv:
          - /usr/local/lib/dns-proxmox-audit/static-endpoints-export.py
          - --output-dir
          - "{{ dns_audit_fetch_src | default('/var/lib/dns-audit', true) }}"
      become: true
      become_flags: -n
      changed_when: true

    - name: Rsync from target host
      ansible.builtin.command:
        argv:
          - rsync
          - -az
          - -e
          - "ssh {{ dns_audit_ssh_common_args | default('-o BatchMode=yes -o StrictHostKeyChecking=accept-new', true) }}"
          - "{{ _dns_rsync_user }}@{{ _dns_rsync_host }}:{{ dns_audit_fetch_src | default('/var/lib/dns-audit', true) }}/"
          - "{{ dns_audit_local_pull }}/"
      changed_when: true
      delegate_to: localhost
      connection: local

    - name: Merge to names review only
      ansible.builtin.command:
        argv:
          - "{{ dns_merge_python }}"
          - "{{ dns_audit_root }}/lib/dns-resolve-and-stage-for-pve.py"
          - --input-dir
          - "{{ dns_audit_local_pull }}"
          - --names-review
          - "{{ dns_audit_names_review | default(dns_audit_root + '/.names-review.txt') }}"
      when: not (dns_merge_emit_pve | default(true) | bool)
      changed_when: true
      delegate_to: localhost
      connection: local

    - name: Merge, resolve, write PVE staged
      ansible.builtin.command:
        argv: "{{ _argv }}"
      when: dns_merge_emit_pve | default(true) | bool
      changed_when: true
      delegate_to: localhost
      connection: local
      vars:
        _base:
          - "{{ dns_merge_python }}"
          - "{{ dns_audit_root }}/lib/dns-resolve-and-stage-for-pve.py"
          - --input-dir
          - "{{ dns_audit_local_pull }}"
          - --names-review
          - "{{ dns_audit_names_review | default(dns_audit_root + '/.names-review.txt') }}"
          - --emit-pve
          - --pve-staged
          - "{{ dns_audit_pve_staged | default(dns_audit_root + '/.pve-allowed-staged.txt') }}"
        _argv: "{{ _base + (['--ipv4-only'] if (dns_merge_ipv4_only | default(false) | bool) else []) }}"
