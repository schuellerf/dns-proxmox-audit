---
# Target: static APT/NTP export, journal DNS export, merge hourly DNS names → names-review.txt; controller: fetch for manual review.
# Before merge, runs hourly_export on the target so names-review includes fresh journal data (default: current partial hour through now).
# Step 3 (Proxmox): ansible/proxmox-update-allowed-ips.yml --tags resolve then --tags deploy (see README)
# -e dns_target_host=…
# -e dns_audit_fetch_src=…  audit directory on target (default /var/lib/dns-audit)
# -e dns_audit_names_review=…  local path for names-review fetch (default repo /names-review.txt)
# -e dns_audit_apt_names=…  -e dns_audit_ntp_list=…  -e dns_audit_dns_ips=…  local paths for static exports
# -e dns_pull_merge_hourly_export_mode=current|previous  default current (previous = only last full local hour, like the timer)
# -e ansible_ssh_private_key_file=…  -e dns_audit_ssh_common_args=…
- name: Pull dns names and merge
  hosts: "{{ dns_target_host | default('localhost') }}"
  gather_facts: false
  vars:
    dns_audit_root: "{{ playbook_dir | dirname }}"
    ansible_ssh_common_args: "{{ dns_audit_ssh_common_args | default('-o BatchMode=yes -o StrictHostKeyChecking=accept-new', true) }}"

  tasks:
    - name: Assert target host is set
      ansible.builtin.assert:
        that:
          - dns_target_host is defined
          - dns_target_host | string | length > 0
        fail_msg: "Set -e dns_target_host=TARGET_SSH to the audit host (your SSH name for that system)."
      become: false

    - name: Refresh static APT and NTP host lists on target host
      ansible.builtin.command:
        argv:
          - /usr/bin/python3
          - -m
          - dns_proxmox_audit.static_endpoints
          - --output-dir
          - "{{ dns_audit_fetch_src | default('/var/lib/dns-audit', true) }}"
      environment:
        PYTHONPATH: /usr/local/lib
      become: true
      become_flags: -n
      changed_when: true

    - name: Export journal DNS names from systemd-resolved (before merge)
      ansible.builtin.command:
        argv: "{{ ['/usr/bin/python3', '-m', 'dns_proxmox_audit.hourly_export', '--output-dir', _dns_a_dir] + (['--previous-hour'] if (dns_pull_merge_hourly_export_mode | default('current') | string == 'previous') else []) }}"
      environment:
        PYTHONPATH: /usr/local/lib
      become: true
      become_flags: -n
      changed_when: true
      vars:
        _dns_a_dir: "{{ (dns_audit_fetch_src | default('/var/lib/dns-audit', true)) | regex_replace('/+$', '') }}"

    - name: Merge hourly DNS names on target into names-review.txt
      ansible.builtin.command:
        argv:
          - /usr/bin/python3
          - -m
          - dns_proxmox_audit.merge_hourly
          - --output-dir
          - "{{ _dns_a_dir }}"
      environment:
        PYTHONPATH: /usr/local/lib
      become: true
      become_flags: -n
      changed_when: true
      vars:
        _dns_a_dir: "{{ (dns_audit_fetch_src | default('/var/lib/dns-audit', true)) | regex_replace('/+$', '') }}"

    - name: Fetch names review to controller
      ansible.builtin.fetch:
        src: "{{ _t_names }}"
        dest: "{{ dns_audit_names_review | default(dns_audit_root + '/names-review.txt', true) }}"
        flat: true
      become: true
      become_flags: -n
      vars:
        _dns_a_dir: "{{ (dns_audit_fetch_src | default('/var/lib/dns-audit', true)) | regex_replace('/+$', '') }}"
        _t_names: "{{ _dns_a_dir }}/names-review.txt"

    - name: Fetch apt-names, ntp, and dns-ips to controller
      ansible.builtin.fetch:
        src: "{{ _dns_a_dir }}/{{ item.src }}"
        dest: "{{ item.dest }}"
        flat: true
      become: true
      become_flags: -n
      loop:
        - src: apt-names.txt
          dest: "{{ dns_audit_apt_names | default(dns_audit_root + '/apt-names.txt', true) }}"
        - src: ntp.txt
          dest: "{{ dns_audit_ntp_list | default(dns_audit_root + '/ntp.txt', true) }}"
        - src: dns-ips.txt
          dest: "{{ dns_audit_dns_ips | default(dns_audit_root + '/dns-ips.txt', true) }}"
      vars:
        _dns_a_dir: "{{ (dns_audit_fetch_src | default('/var/lib/dns-audit', true)) | regex_replace('/+$', '') }}"
