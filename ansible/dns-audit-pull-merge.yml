---
# Run on the Ansible controller: refresh static lists on target, rsync audit dir, merge *dns-names.txt, optional resolve to IPs.
# -e dns_target_host=TARGET_SSH  (or deprecated -e dns_journal_host=…)
# -e dns_merge_emit_pve=false  # names list only, no getaddrinfo on this host
- name: Pull dns names and merge
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    dns_audit_root: "{{ playbook_dir | dirname }}"
    dns_audit_local_pull: "{{ dns_audit_root }}/.pulled-audit"
    dns_audit_fetch_src: "{{ dns_audit_fetch_src | default('/var/lib/dns-audit') }}"

  tasks:
    - name: Resolve audit target host (dns_target_host or legacy dns_journal_host)
      ansible.builtin.set_fact:
        _dns_target: "{{ dns_target_host | default(dns_journal_host | default('', true), true) }}"

    - name: Assert audit target host
      ansible.builtin.assert:
        that:
          - _dns_target is defined
          - _dns_target | string | length > 0
        fail_msg: "Set -e dns_target_host=TARGET_SSH (or deprecated dns_journal_host)"

    - name: Ensure local pull directory
      ansible.builtin.file:
        path: "{{ dns_audit_local_pull }}"
        state: directory
        mode: "0750"

    - name: Refresh static APT and NTP host lists on target host
      ansible.builtin.command:
        argv:
          - ssh
          - -o
          - BatchMode=yes
          - -o
          - StrictHostKeyChecking=accept-new
          - "{{ (dns_audit_rsync_user | default(ansible_user, true)) | default(lookup('env', 'USER'), true) | string }}@{{ _dns_target }}"
          - sudo
          - -n
          - /usr/local/lib/dns-proxmox-audit/static-endpoints-export.py
          - --output-dir
          - "{{ dns_audit_fetch_src }}"
      changed_when: true

    - name: Rsync from target host
      ansible.builtin.command:
        argv:
          - rsync
          - -az
          - "{{ (dns_audit_rsync_user | default(ansible_user, true)) | default(lookup('env', 'USER'), true) | string }}@{{ _dns_target }}:{{ dns_audit_fetch_src }}/"
          - "{{ dns_audit_local_pull }}/"
      changed_when: true

    - name: Merge to names review only
      ansible.builtin.command:
        argv:
          - python3
          - "{{ dns_audit_root }}/lib/dns-resolve-and-stage-for-pve.py"
          - --input-dir
          - "{{ dns_audit_local_pull }}"
          - --names-review
          - "{{ dns_audit_names_review | default(dns_audit_root + '/.names-review.txt') }}"
      when: not (dns_merge_emit_pve | default(true) | bool)
      changed_when: true

    - name: Merge, resolve, write PVE staged
      ansible.builtin.command:
        argv: "{{ _argv }}"
      vars:
        _base:
          - python3
          - "{{ dns_audit_root }}/lib/dns-resolve-and-stage-for-pve.py"
          - --input-dir
          - "{{ dns_audit_local_pull }}"
          - --names-review
          - "{{ dns_audit_names_review | default(dns_audit_root + '/.names-review.txt') }}"
          - --emit-pve
          - --pve-staged
          - "{{ dns_audit_pve_staged | default(dns_audit_root + '/.pve-allowed-staged.txt') }}"
        _argv: "{{ _base + (['--ipv4-only'] if (dns_merge_ipv4_only | default(false) | bool) else []) }}"
      when: dns_merge_emit_pve | default(true) | bool
      changed_when: true
