---
# Step 3: fetch guest .fw from PVE, resolve names on the controller, merge locally, then
# deploy: upload merged .fw, pve-firewall compile, reload.
# Typical:
#   ansible-playbook -i 'PVE,' -b -K -e pve_vmid=100 --tags resolve ansible/proxmox-update-allowed-ips.yml
#   ansible-playbook -i 'PVE,' -b -K -e pve_vmid=100 --tags deploy ansible/proxmox-update-allowed-ips.yml
# -e pve_vmid=… — guest VM id; firewall path = /etc/pve/firewall/<id>.fw (default pve_vmid: 100)
# -e pve_vm_fw=… — full path to guest .fw on the node (overrides pve_vmid path)
# -e dns_resolve_ipv4_only=true — IPv4 only (getaddrinfo; dns-ips drops IPv6 lines too)
# -e dns_audit_pve_merged_fw=… — local merged .fw for deploy (default .pve-fw-merged.<vmid>.fw under repo)
# Managed IPSET bodies: apt-names, ntp-names, reviewed-names, dns-ips (from apt/ntp/names-review; dns-ips from dns-ips.txt, no getaddrinfo).
# [RULES] and all other [IPSET …] blocks are copied unchanged from the fetched .fw; wire +guest/apt-names, +guest/dns-ips, etc. in Proxmox yourself.
- name: Fetch guest .fw from PVE to repo (for local merge)
  hosts: all
  become: true
  gather_facts: false
  tags: [resolve]
  vars:
    dns_audit_root: "{{ playbook_dir | dirname }}"
    _pve_fw: "{{ pve_vm_fw if (pve_vm_fw is defined and pve_vm_fw | string | length > 0) else ('/etc/pve/firewall/' + (pve_vmid | default(100) | string) + '.fw') }}"
    dns_audit_pve_fetched: "{{ dns_audit_root }}/.pve-fw.fetched.{{ pve_vmid | default(100) | string }}.fw"

  tasks:
    - name: Slurp guest firewall from node
      ansible.builtin.slurp:
        src: "{{ _pve_fw }}"
      register: _pve_fw_slurp

    - name: Write fetched .fw on localhost
      become: false
      ansible.builtin.copy:
        content: "{{ _pve_fw_slurp['content'] | b64decode }}"
        dest: "{{ dns_audit_pve_fetched }}"
        mode: "0600"
      delegate_to: localhost
      connection: local

- name: Resolve hostname lists to staged IP files and merge with fetched .fw (localhost)
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  tags: [resolve]
  vars:
    dns_audit_root: "{{ playbook_dir | dirname }}"
    dns_audit_apt_names: "{{ dns_audit_root }}/apt-names.txt"
    dns_audit_ntp_names: "{{ dns_audit_root }}/ntp.txt"
    dns_audit_names_review: "{{ dns_audit_root }}/names-review.txt"
    dns_audit_dns_ips: "{{ dns_audit_root }}/dns-ips.txt"
    dns_audit_pve_staged_apt: "{{ dns_audit_root }}/.pve-apt-names-staged.txt"
    dns_audit_pve_staged_ntp: "{{ dns_audit_root }}/.pve-ntp-names-staged.txt"
    dns_audit_pve_staged_reviewed: "{{ dns_audit_root }}/.pve-allowed-staged.txt"
    dns_audit_pve_staged_dns: "{{ dns_audit_root }}/.pve-dns-ips-staged.txt"
    dns_audit_pve_fetched: "{{ dns_audit_root }}/.pve-fw.fetched.{{ pve_vmid | default(100) | string }}.fw"
    dns_audit_pve_merged_fw: "{{ dns_audit_root }}/.pve-fw-merged.{{ pve_vmid | default(100) | string }}.fw"

  tasks:
    - name: Build staged IP files (apt-names, ntp-names, reviewed-names, dns-ips)
      ansible.builtin.command:
        argv: "{{ _resolve_argv }}"
      args:
        chdir: "{{ dns_audit_root }}"
      changed_when: true
      vars:
        _py: "{{ ansible_python_interpreter | default('/usr/bin/python3') }}"
        _resolve_argv: "{{ [_py, dns_audit_root + '/lib/dns-resolve-names-for-pve.py', '--apt-names', dns_audit_apt_names, '--ntp-names', dns_audit_ntp_names, '--names-review', dns_audit_names_review, '--apt-staged', dns_audit_pve_staged_apt, '--ntp-staged', dns_audit_pve_staged_ntp, '--pve-staged', dns_audit_pve_staged_reviewed, '--dns-ips', dns_audit_dns_ips, '--dns-ips-staged', dns_audit_pve_staged_dns] + (['--ipv4-only'] if (dns_resolve_ipv4_only | default(false) | bool) else []) }}"

    - name: Local merge (dry-run) into .pve-fw-merged file
      ansible.builtin.command:
        argv: "{{ _merge_dryrun_argv }}"
      register: _merged_fw_content
      changed_when: true
      args:
        chdir: "{{ dns_audit_root }}"
      vars:
        _py: "{{ ansible_python_interpreter | default('/usr/bin/python3') }}"
        _merge_dryrun_argv: "{{ [_py, dns_audit_root + '/lib/proxmox-update-allowed-ips.py', '--firewall', dns_audit_pve_fetched, '--dry-run', '--managed-ipset', ('apt-names:' + dns_audit_pve_staged_apt), '--managed-ipset', ('ntp-names:' + dns_audit_pve_staged_ntp), '--managed-ipset', ('reviewed-names:' + dns_audit_pve_staged_reviewed), '--managed-ipset', ('dns-ips:' + dns_audit_pve_staged_dns)] }}"

    - name: Write merged .fw for review and deploy
      ansible.builtin.copy:
        content: "{{ _merged_fw_content.stdout }}"
        dest: "{{ dns_audit_pve_merged_fw }}"
        mode: "0600"

- name: Upload merged .fw, compile, reload
  hosts: all
  become: true
  gather_facts: false
  tags: [deploy]
  vars:
    dns_audit_root: "{{ playbook_dir | dirname }}"
    _pve_fw: "{{ pve_vm_fw if (pve_vm_fw is defined and pve_vm_fw | string | length > 0) else ('/etc/pve/firewall/' + (pve_vmid | default(100) | string) + '.fw') }}"
    dns_audit_pve_merged_fw: "{{ dns_audit_root }}/.pve-fw-merged.{{ pve_vmid | default(100) | string }}.fw"

  tasks:
    - name: Install merged .fw to node
      ansible.builtin.copy:
        src: "{{ dns_audit_pve_merged_fw }}"
        dest: "{{ _pve_fw }}"

    - name: pve-firewall compile
      ansible.builtin.command:
        cmd: pve-firewall compile
      register: _compile
      failed_when: _compile.rc != 0
      changed_when: _compile.rc == 0

    - name: Reload pve-firewall
      ansible.builtin.command:
        cmd: systemctl reload pve-firewall
      changed_when: true
      failed_when: false
